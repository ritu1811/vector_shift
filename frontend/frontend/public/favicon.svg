<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Background Shape -->
  <rect width="100" height="100" rx="24" fill="url(#grad1)" />
  
  <!-- Outer Ring (Node) -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.2" />
  
  <!-- Connecting Lines -->
  <path d="M 20 50 L 35 50" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <path d="M 65 50 L 80 50" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <path d="M 50 20 L 50 35" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  
  <!-- Central Shift / Vector Arrow -->
  <path d="M 40 60 L 60 40 M 60 40 L 45 40 M 60 40 L 60 55" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />
</svg>
